<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Tracker</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #141414;
      --border: #222;
      --text: #e8e8e8;
      --muted: #666;
      --faint: #333;
      --up: #00c98a;
      --up-bg: #00c98a18;
      --down: #ff4d4d;
      --down-bg: #ff4d4d18;
      --accent: #e8e8e8;
      --mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    header .meta {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    header .meta span {
      display: block;
    }

    #timestamp {
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      transition: border-color 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--faint);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .card.up::before { background: var(--up); }
    .card.down::before { background: var(--down); }

    .card .sym {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .card .name {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .card .price {
      font-size: 22px;
      font-weight: 700;
      margin: 12px 0 6px;
      letter-spacing: -0.02em;
    }

    .card .change {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .card.up .price { color: var(--up); }
    .card.down .price { color: var(--down); }
    .card.up .change { color: var(--up); background: var(--up-bg); }
    .card.down .change { color: var(--down); background: var(--down-bg); }

    .card .vol {
      font-size: 10px;
      color: var(--muted);
      margin-top: 10px;
    }

    .skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .skeleton .line {
      background: var(--border);
      border-radius: 3px;
      margin-bottom: 8px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    footer {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--text); }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    #refresh-btn:hover {
      border-color: var(--faint);
      color: var(--text);
    }

    #refresh-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .error-msg {
      grid-column: 1 / -1;
      background: var(--down-bg);
      border: 1px solid var(--down);
      border-radius: 6px;
      padding: 16px;
      font-size: 12px;
      color: var(--down);
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 1.5rem 0 0.5rem;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .market-dot {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
    }

    .market-dot::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .market-dot.open { color: var(--up); }
    .market-dot.open::before { background: var(--up); box-shadow: 0 0 4px var(--up); }
    .market-dot.closed::before { background: var(--muted); }

    .card.etf { border-style: dashed; }
    .card.etf .sym { color: var(--muted); font-size: 10px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Market Tracker</h1>
  </div>
  <div class="meta">
    <span id="timestamp">--</span>
    <span id="market-status" style="margin-top:4px;display:flex;gap:10px;justify-content:flex-end;"></span>
    <span>Données différées · Yahoo Finance</span>
  </div>
</header>

<div class="grid" id="grid"></div>

<footer>
  <span>Source : Yahoo Finance · via proxy CORS</span>
  <button id="refresh-btn" onclick="loadStocks()">↻ Actualiser</button>
</footer>

<script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  // Aucune clé API requise — Yahoo Finance via proxy CORS
  const STOCKS = [
    { sym: 'AIR.PA',   name: 'Airbus',           cur: '€' },
    { sym: 'HO.PA',    name: 'Thales',            cur: '€' },
    { sym: 'BNP.PA',   name: 'BNP Paribas',       cur: '€' },
    { sym: 'AI.PA',    name: 'Air Liquide',        cur: '€' },
    { sym: 'DSY.PA',   name: 'Dassault Systèmes',  cur: '€' },
    { sym: 'SU.PA',    name: 'Schneider Electric', cur: '€' },
    { sym: 'STLAP.PA', name: 'Stellantis',         cur: '€' },
    { sym: 'OR.PA',    name: 'L\'Oréal',           cur: '€' },
    { sym: 'SAN.PA',   name: 'Sanofi',             cur: '€' },
    { sym: 'AM.PA',    name: 'Dassault Aviation',  cur: '€' },
    { sym: 'NVDA',     name: 'Nvidia',             cur: '$' },
    { sym: 'TTWO',     name: 'Take-Two',           cur: '$' },
  ];

  const ETFS = [
    { sym: 'WPEA.PA',  name: 'MSCI World ESG',    cur: '€', etf: true },
    { sym: 'CW8.PA',   name: 'MSCI World',         cur: '€', etf: true },
  ];
  // ─────────────────────────────────────────────────────────────────────────

  const grid = document.getElementById('grid');
  const btn  = document.getElementById('refresh-btn');
  const ts   = document.getElementById('timestamp');

  // ─── MARKET STATUS ────────────────────────────────────────────────────────
  function getMarketStatus() {
    const now = new Date();
    // Heure Paris (UTC+1 hiver, UTC+2 été)
    const paris = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
    const ny    = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
    const pDay  = paris.getDay(); // 0=dim, 6=sam
    const nDay  = ny.getDay();
    const pH    = paris.getHours() + paris.getMinutes() / 60;
    const nH    = ny.getHours() + ny.getMinutes() / 60;
    const euOpen  = pDay >= 1 && pDay <= 5 && pH >= 9 && pH < 17.5;
    const usOpen  = nDay >= 1 && nDay <= 5 && nH >= 9.5 && nH < 16;
    return { euOpen, usOpen };
  }

  function renderMarketStatus() {
    const { euOpen, usOpen } = getMarketStatus();
    const el = document.getElementById('market-status');
    el.innerHTML = `
      <span class="market-dot ${euOpen ? 'open' : 'closed'}">Euronext ${euOpen ? 'ouvert' : 'fermé'}</span>
      <span class="market-dot ${usOpen ? 'open' : 'closed'}">NYSE/NASDAQ ${usOpen ? 'ouvert' : 'fermé'}</span>
    `;
  }
  // ─────────────────────────────────────────────────────────────────────────

  function renderSkeletons() {
    grid.innerHTML = STOCKS.map(() => `
      <div class="skeleton">
        <div class="line" style="width:60px;height:12px;"></div>
        <div class="line" style="width:100px;height:10px;margin-top:4px;"></div>
        <div class="line" style="width:90px;height:24px;margin-top:12px;"></div>
        <div class="line" style="width:70px;height:18px;"></div>
      </div>
    `).join('');
  }

  async function fetchQuote(sym) {
    const url = `https://dawn-violet-adf5.francoiseverdou.workers.dev/?sym=${sym}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const meta = data.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.previousClose || meta.chartPreviousClose;
    const change = price - prev;
    const changePct = (change / prev) * 100;
    const vol = meta.regularMarketVolume || 0;
    return { c: price, d: change, dp: changePct, v: vol };
  }

  function fmtVol(v) {
    if (!v) return '—';
    if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
    if (v >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (v >= 1e3) return (v / 1e3).toFixed(0) + 'K';
    return v.toString();
  }

  function renderCard(stock, q) {
    const up   = q.d >= 0;
    const cls  = up ? 'up' : 'down';
    const sign = up ? '+' : '';
    const card = document.createElement('div');
    card.className = `card ${cls}${stock.etf ? ' etf' : ''}`;
    card.innerHTML = `
      <div class="sym">${stock.sym}${stock.etf ? ' <span style="font-size:9px;color:var(--muted);font-weight:400">ETF</span>' : ''}</div>
      <div class="name">${stock.name}</div>
      <div class="price">${stock.cur}${q.c.toFixed(2)}</div>
      <div class="change">${sign}${q.d.toFixed(2)} &nbsp; ${sign}${q.dp.toFixed(2)}%</div>
      <div class="vol">Vol · ${fmtVol(q.v)}</div>
    `;
    return card;
  }

  function addSectionLabel(text) {
    const el = document.createElement('div');
    el.className = 'section-label';
    el.style.gridColumn = '1 / -1';
    el.textContent = text;
    grid.appendChild(el);
  }

  async function loadStocks() {
    renderSkeletons();
    btn.disabled = true;
    renderMarketStatus();

    const allSyms = [...STOCKS, ...ETFS];
    const results = await Promise.allSettled(allSyms.map(s => fetchQuote(s.sym)));

    grid.innerHTML = '';

    // Section actions
    addSectionLabel('Actions');
    STOCKS.forEach((stock, i) => {
      const res = results[i];
      if (res.status === 'fulfilled') {
        grid.appendChild(renderCard(stock, res.value));
      } else {
        const err = document.createElement('div');
        err.className = 'skeleton';
        err.style.opacity = '0.4';
        err.innerHTML = `<div class="line" style="width:60px;height:12px;"></div><div style="font-size:10px;color:#666;margin-top:8px">${stock.sym} — erreur</div>`;
        grid.appendChild(err);
      }
    });

    // Section ETF
    addSectionLabel('Référence marché');
    ETFS.forEach((stock, i) => {
      const res = results[STOCKS.length + i];
      if (res.status === 'fulfilled') {
        grid.appendChild(renderCard(stock, res.value));
      } else {
        const err = document.createElement('div');
        err.className = 'skeleton';
        err.style.opacity = '0.4';
        err.innerHTML = `<div class="line" style="width:60px;height:12px;"></div><div style="font-size:10px;color:#666;margin-top:8px">${stock.sym} — erreur</div>`;
        grid.appendChild(err);
      }
    });

    ts.textContent = new Date().toLocaleTimeString('fr-FR');
    btn.disabled = false;
  }

  loadStocks();
  setInterval(loadStocks, 60_000);
  setInterval(renderMarketStatus, 30_000);
</script>

</body>
</html>
